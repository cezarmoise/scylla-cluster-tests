test_duration: 1200

# Keyspace and table used by cassandra-stress commands below (same as cassandra-stress defaults)
perf_stress_keyspace: keyspace1
perf_stress_table: standard1

# Define the commands to be used in the write-load test. The purpose of this command is to prepare the schema without hardcoded ks.table definition.
prepare_stress_cmd: "cassandra-stress write cl=ALL n=1 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode connectionsPerHost=8 cql3 native -rate 'threads=1' -col 'size=FIXED(1024) n=FIXED(1)'"

prepare_write_cmd: [
    "cassandra-stress write  cl=ALL n=162500001 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=        1..160000001",
    "cassandra-stress write  cl=ALL n=162500001 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=160000002..320000002",
    "cassandra-stress write  cl=ALL n=162500001 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=320000003..480000003",
    "cassandra-stress write  cl=ALL n=162500001 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=480000004..640000004"
]

stress_cmd_r: [
  "cassandra-stress read no-warmup  cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop   'dist=seq(        1..160000001)'",
  "cassandra-stress read no-warmup  cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop   'dist=seq(        1..160000001)'",
  "cassandra-stress read no-warmup  cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop 'dist=gauss(320000003..480000003,400000000,24000000)'",
  "cassandra-stress read no-warmup  cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop 'dist=gauss(480000004..640000004,560000000,24000000)'"
]

round_robin: true

n_db_nodes: 3
n_loaders: 4

instance_type_db: 'i7i.2xlarge'
instance_type_loader: 'c7i.8xlarge'
instance_type_monitor: 't3.small'
use_capacity_reservation: true
nemesis_add_node_cnt: 0

use_preinstalled_scylla: true

user_prefix: 'trie-tests'
argus_email_report_template: email_report_performance.yaml

backtrace_decoding: true
backtrace_stall_decoding: false

use_mgmt: false

use_hdrhistogram: true

append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
append_scylla_yaml:
  auto_snapshot: false

use_placement_group: true
use_prepared_loaders: false

adaptive_timeout_store_metrics: false

perf_gradual_threads: {"read": 620}  # number of threads to use for each load type
perf_gradual_throttle_steps: {"read": ['100000', '110000', '120000', '130000', '140000', '150000', '160000', '170000', '180000', '190000', '200000']}  # where every value is in ops
perf_gradual_step_duration: {"read": '30m'}  # duration per step; None means until completion of the stress command

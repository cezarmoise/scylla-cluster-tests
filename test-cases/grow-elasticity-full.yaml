test_duration: 2880
prepare_write_cmd: [
  "cassandra-stress write no-warmup cl=ALL n=100000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1..100000000",
  "cassandra-stress write no-warmup cl=ALL n=100000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=100000001..200000000",
  "cassandra-stress write no-warmup cl=ALL n=100000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=200000001..300000000",
  "cassandra-stress write no-warmup cl=ALL n=50000000  -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=300000001..400000000",
]

pre_create_keyspace: "CREATE KEYSPACE IF NOT EXISTS keyspace1 WITH replication = {'class': 'NetworkTopologyStrategy', 'replication_factor': 3} AND tablets = {'initial': 32};"

stress_cmd: [
  "cassandra-stress read no-warmup cl=ONE  duration=2880m -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=1 fixed=10/s' -col 'size=FIXED(128) n=FIXED(8)' -pop 'dist=gauss(1..200000000,100000000,2000000)'",
]
stress_cmd_w: [
  "cassandra-stress write no-warmup cl=ALL n=100000000 -schema keyspace=keyspace_placeholder 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1..100000000",
  "cassandra-stress write no-warmup cl=ALL n=100000000 -schema keyspace=keyspace_placeholder 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=100000001..200000000",
  "cassandra-stress write no-warmup cl=ALL n=100000000 -schema keyspace=keyspace_placeholder 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=200000001..300000000",
  "cassandra-stress write no-warmup cl=ALL n=50000000  -schema keyspace=keyspace_placeholder 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=150 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=300000001..400000000",
]

n_db_nodes: 3
instance_type_db: 'i4i.large'

n_loaders: 4
instance_type_loader: 'c6i.2xlarge'

n_monitor_nodes: 1
instance_type_monitor: 't3.large'

nemesis_class_name: 'GrowIncrementalMonkey'
nemesis_interval: 10
nemesis_sequence_sleep_between_ops: 10
nemesis_during_prepare: false

user_prefix: 'elasticity-test'

round_robin: true
append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
backtrace_decoding: false
print_kernel_callstack: true
parallel_node_operations: true

test_duration: 2880
prepare_write_cmd: [
  "cassandra-stress write no-warmup cl=ALL n=300000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1..300000000",
  "cassandra-stress write no-warmup cl=ALL n=300000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=300000001..600000000",
  "cassandra-stress write no-warmup cl=ALL n=200000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=600000001..900000000",
  "cassandra-stress write no-warmup cl=ALL n=200000000 -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=900000001..1200000000",
  ]

stress_cmd_m: "cassandra-stress mixed no-warmup cl=QUORUM duration=800m -schema 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=300 fixed=16875/s' -col 'size=FIXED(128) n=FIXED(8)' -pop 'dist=gauss(1..600000000,300000000,6000000)'"

stress_cmd: [
  "cassandra-stress write no-warmup cl=ALL n=150000000 -schema keyspace=ks_fill_1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=6000000001..6600000000",
  "cassandra-stress write no-warmup cl=ALL n=150000000 -schema keyspace=ks_fill_2 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=6600000001..7200000000",
  "cassandra-stress write no-warmup cl=ALL n=150000000 -schema keyspace=ks_fill_3 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=7200000001..7800000000",
]

n_db_nodes: 3
instance_type_db: 'i4i.2xlarge'

nemesis_add_node_cnt: 1
nemesis_grow_shrink_instance_type: 'i4i.large'

n_loaders: 4
instance_type_loader: 'c6i.2xlarge'

n_monitor_nodes: 1
instance_type_monitor: 't3.large'

nemesis_class_name: 'GrowFillNemesis'
nemesis_interval: 30
nemesis_sequence_sleep_between_ops: 10

user_prefix: 'elasticity-test'
ami_id_db_scylla_desc: 'VERSION_DESC'

round_robin: true
append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
backtrace_decoding: false
print_kernel_callstack: true

store_perf_results: true
# email_recipients: ["scylla-perf-results@scylladb.com"]
use_hdr_cs_histogram: true
email_subject_postfix: 'elasticity test'
parallel_node_operations: true

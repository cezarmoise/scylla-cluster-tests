test_duration: 1200

# Keyspace and table used by cassandra-stress commands below (same as cassandra-stress defaults)
perf_stress_keyspace: keyspace1
perf_stress_table: standard1

prepare_write_cmd: [
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(insert=1)'  cl=ALL n=162500001 -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=        1..160000001",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(insert=1)'  cl=ALL n=162500001 -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=160000002..320000002",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(insert=1)'  cl=ALL n=162500001 -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=320000003..480000003",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(insert=1)'  cl=ALL n=162500001 -mode connectionsPerHost=8 cql3 native -rate threads=50 throttle=20000/s -col 'size=FIXED(1024) n=FIXED(1)'  -pop seq=480000004..640000004"
]

stress_cmd_r: [
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' no-warmup cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop   'dist=seq(        1..160000001)'",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' no-warmup cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop   'dist=seq(160000002..320000002)'",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' no-warmup cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop 'dist=gauss(320000003..480000003,400000000,24000000)'",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' no-warmup cl=QUORUM duration=$duration -mode connectionsPerHost=8 cql3 native -rate 'threads=$threads $throttle' -col 'size=FIXED(1024) n=FIXED(1)' -pop 'dist=gauss(480000004..640000004,560000000,24000000)'"
]

stress_cmd_cache_warmup: [
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' cl=ALL n=160000000 -mode connectionsPerHost=8 cql3 native -rate 'threads=620' -col 'size=FIXED(1024) n=FIXED(1)' -pop   'dist=seq(        1..160000001)'",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' cl=ALL n=160000000 -mode connectionsPerHost=8 cql3 native -rate 'threads=620' -col 'size=FIXED(1024) n=FIXED(1)' -pop   'dist=seq(160000002..320000002)'",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' cl=ALL n=160000000 -mode connectionsPerHost=8 cql3 native -rate 'threads=620' -col 'size=FIXED(1024) n=FIXED(1)' -pop 'dist=gauss(320000003..480000003,400000000,24000000)'",
  "cassandra-stress user profile=/tmp/favorable-trie-index-profile.yaml 'ops(read=1)' cl=ALL n=160000000 -mode connectionsPerHost=8 cql3 native -rate 'threads=620' -col 'size=FIXED(1024) n=FIXED(1)' -pop 'dist=gauss(480000004..640000004,560000000,24000000)'"
]

round_robin: true

n_db_nodes: 3
n_loaders: 4

instance_type_db: 'i8g.2xlarge'
instance_type_loader: 'c7i.4xlarge'
instance_type_monitor: 't3.small'
use_capacity_reservation: true
nemesis_add_node_cnt: 0

use_preinstalled_scylla: true

user_prefix: 'trie-tests'
argus_email_report_template: email_report_performance.yaml
billing_project: 'Trie-based index'

backtrace_decoding: true
backtrace_stall_decoding: false

use_mgmt: false

use_hdrhistogram: true

append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
append_scylla_yaml:
  auto_snapshot: false

use_placement_group: true
use_prepared_loaders: false

adaptive_timeout_store_metrics: false

perf_gradual_threads: {"read": 620}  # number of threads to use for each load type
perf_gradual_throttle_steps: {"read": ['230000', '240000', '250000', '260000', '270000', '280000', '290000', '300000', '310000', '320000', '330000', '340000', '350000']}  # where every value is in ops
perf_gradual_step_duration: {"read": '30m'}  # duration per step; None means until completion of the stress command

test_duration: 360
prepare_write_cmd: [
  "cassandra-stress write no-warmup cl=QUORUM n=120000000 -schema keyspace=keyspace1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=200' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1..120000000",
  "cassandra-stress write no-warmup cl=QUORUM n=120000000 -schema keyspace=keyspace1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=200' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=120000001..240000000",
  "cassandra-stress write no-warmup cl=QUORUM n=120000000 -schema keyspace=keyspace1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=200' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=240000001..360000000",
]

pre_create_keyspace: [
  "CREATE KEYSPACE IF NOT EXISTS keyspace1 WITH replication = {'class': 'NetworkTopologyStrategy', 'replication_factor': 3};",
  "CREATE TABLE IF NOT EXISTS keyspace1.standard1 (key blob PRIMARY KEY, \"C0\" blob, \"C1\" blob, \"C2\" blob, \"C3\" blob, \"C4\" blob, \"C5\" blob, \"C6\" blob, \"C7\" blob) WITH  tablets = {'min_per_shard_tablet_count': 10};",
  "CREATE KEYSPACE IF NOT EXISTS keyspace2 WITH replication = {'class': 'NetworkTopologyStrategy', 'replication_factor': 3};",
  "CREATE TABLE IF NOT EXISTS keyspace1.standard1 (key blob PRIMARY KEY, \"C0\" blob, \"C1\" blob, \"C2\" blob, \"C3\" blob, \"C4\" blob, \"C5\" blob, \"C6\" blob, \"C7\" blob) WITH  tablets = {'min_per_shard_tablet_count': 10};",
]

stress_cmd: [
  "cassandra-stress read no-warmup cl=QUORUM duration=180m -schema keyspace=keyspace1 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=10 fixed=30/s' -col 'size=FIXED(128) n=FIXED(8)' -pop 'dist=gauss(1..180000000,90000000,1800000)'",
]

stress_cmd_w: "cassandra-stress write no-warmup cl=QUORUM n=120000000 -schema keyspace=keyspace2 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=200' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1..120000000"

n_db_nodes: 3
availability_zone: 'a'
simulated_racks: 3
instance_type_db: 'i4i.large'

n_loaders: 3
instance_type_loader: 'c6i.large'

n_monitor_nodes: 1
instance_type_monitor: 't3.large'

nemesis_class_name: 'ThrottlingMonkey:1 MgmtBackupSpecificKeyspaces:1 MgmtRepair:1'
nemesis_during_prepare: false
nemesis_interval: 30
nemesis_sequence_sleep_between_ops: 10

user_prefix: 'elasticity-test'

round_robin: true
append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
backtrace_decoding: false
print_kernel_callstack: true

append_scylla_yaml:
  auto_snapshot: false

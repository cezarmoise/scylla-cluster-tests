test_duration: 6000
prepare_write_cmd: [
  "cassandra-stress write no-warmup cl=QUORUM n=1920000000 -schema keyspace=keyspace_name 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=100 fixed=3000/s' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1..1920000000",
  "cassandra-stress write no-warmup cl=QUORUM n=1920000000 -schema keyspace=keyspace_name 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=100 fixed=3000/s' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=1920000001..3840000000",
  "cassandra-stress write no-warmup cl=QUORUM n=1920000000 -schema keyspace=keyspace_name 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate 'threads=100 fixed=3000/s' -col 'size=FIXED(128) n=FIXED(8)' -pop seq=3840000001..5760000000",
]

pre_create_keyspace: [
  "CREATE KEYSPACE IF NOT EXISTS keyspace_name WITH replication = {'class': 'NetworkTopologyStrategy', 'replication_factor': 3};",
  "CREATE TABLE IF NOT EXISTS keyspace_name.standard1 (key blob PRIMARY KEY, \"C0\" blob, \"C1\" blob, \"C2\" blob, \"C3\" blob, \"C4\" blob, \"C5\" blob, \"C6\" blob, \"C7\" blob) WITH tablets = {'min_per_shard_tablet_count': 128};",
]

n_db_nodes: 3
simulated_racks: 3
instance_type_db: 'i4i.large'

n_loaders: 3
instance_type_loader: 'c6i.2xlarge'

n_monitor_nodes: 1
instance_type_monitor: 't3.large'

user_prefix: 'elasticity-test'

round_robin: true
append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
backtrace_decoding: false
print_kernel_callstack: true
parallel_node_operations: true

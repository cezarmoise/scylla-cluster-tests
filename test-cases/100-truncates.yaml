test_duration: 360
prepare_write_cmd: [
  "cassandra-stress write no-warmup cl=QUORUM n=100000 -schema keyspace=ks_name 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=100001..200000",
  "cassandra-stress write no-warmup cl=QUORUM n=100000 -schema keyspace=ks_name 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=200001..300000",
  "cassandra-stress write no-warmup cl=QUORUM n=100000 -schema keyspace=ks_name 'replication(strategy=NetworkTopologyStrategy,replication_factor=3)' -mode cql3 native -rate threads=200 -col 'size=FIXED(128) n=FIXED(8)' -pop seq=300001..400000",
]

post_prepare_cql_cmds: [
  "TRUNCATE TABLE ks_name.standard1;"
]

n_db_nodes: 3
simulated_racks: 3
instance_type_db: 'i4i.large'

n_loaders: 3
instance_type_loader: 'c6i.2xlarge'

n_monitor_nodes: 1
instance_type_monitor: 't3.large'

user_prefix: 'truncate-test'

round_robin: true
append_scylla_args: '--blocked-reactor-notify-ms 5 --abort-on-lsa-bad-alloc 1 --abort-on-seastar-bad-alloc --abort-on-internal-error 1 --abort-on-ebadf 1'
backtrace_decoding: false
print_kernel_callstack: true

append_scylla_yaml:
  auto_snapshot: false
  enable_tablets: true
  tablets_mode_for_new_keyspaces: 'enabled'

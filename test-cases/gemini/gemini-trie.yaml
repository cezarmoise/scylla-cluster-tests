test_duration: 800
n_db_nodes: 6
n_test_oracle_db_nodes: 1
n_loaders: 1
instance_type_db: 'i7i.xlarge'
instance_type_db_oracle: 'i7i.xlarge'
instance_type_loader: 'm7i.2xlarge'

user_prefix: 'trie-tests'

nemesis_seed: 40
gemini_seed: 40

gemini_cmd: |
  --duration 4h
  --warmup 10m
  --concurrency 200
  --mode mixed
  --partition-count 60000
  --max-errors-to-store 1
  --statement-ratios '{"mutation":{"insert":0.6,"update":0.2,"delete":0.2}}'
  --deleted-partitions-time-bucket='10m'
  --use-server-timestamps=false

gemini_log_cql_statements: true
oracle_scylla_version: '2026.1'

db_type: mixed_scylla
append_scylla_args: '++ --logger-log-level repair=debug'
